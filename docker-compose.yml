services:
  backend:
    build:
      context: ./backendCulturaStory
      dockerfile: Dockerfile
    container_name: culturastory-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: culturastory-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
